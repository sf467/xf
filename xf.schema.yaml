# Rime schema settings
# encoding: utf-8
# `引导拼音反查

schema:
  schema_id: xf
  name: 西风瘦码
  version: "20260514"
  author:
    - 戴石麟
    - 化外愚民
    - 光阴冢
    - 翱翔无限
    - 魔法帽
  dependencies:
    - luna_pinyin
    - stroke
switches:
  - name: _hide_candidate
    reset: 0
  - name: _hide_comment
    reset: 0
  - name: _hide_key_hint
    reset: 0
  - name: ascii_mode
    reset: 1
    states: [ 中文, 英文 ]
  - options: [xf,  zh_simp, zh_mars]
    reset: 0
    states: [ 简体, 繁體, 焱暒妏]
engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - affix_segmentor@pinyin_lookup # 用户自定义@tag
    - affix_segmentor@bihua_lookup
    - affix_segmentor@emoji
    - affix_segmentor@xnumber
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
    - lua_translator@*datetime
    - lua_translator@*xnumber
    - lua_translator@*emoji
    - script_translator@pinyin_lookup
    - table_translator@bihua_lookup
    - history_translator@history
  filters:
    - simplifier@zh_simp
    - simplifier@zh_mars
    - uniquifier
    - reverse_lookup_filter@pinyin_reverse_lookup
    - reverse_lookup_filter@bihua_reverse_lookup
speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba0,./;'^*!?><$=]
  initials: "qwertyuiopasdfghjklzxcvbnm="
  finals: "'"
  auto_select: true  #顶字上屏
  use_space: false
  algebra:
    #- 'xlit|_| |'
    - "derive/^([a-z][a-z;])$/$1_/"
#    - "derive/^([a-z][a-z])$/$1__/"
#    - "xform/_/Z/"
#    - "derive/^(.{4})[^aeuio](.*)$/$1/"

# 主翻译器
translator:
  dictionary: xf
  enable_charset_filter: false
  enable_completion: true
  enable_encoder: true
  enable_sentence: false
  enable_user_dict: false
  encode_commit_history: true
  max_phrase_length: 5


# 滤镜
zh_mars:
  opencc_config: martian.json
  option_name: zh_mars
  tips: all

zh_simp:
  opencc_config: s2t.json
  option_name: zh_simp
  tips: all

# 副翻译器兼分段器
pinyin_lookup:
  tag: pinyin_lookup
  enable_user_dict: false
  dictionary: luna_pinyin
  prefix: "e"             #
  tips: "〔拼音〕"

bihua_lookup:
  tag: bihua_lookup
  enable_user_dict: false
  dictionary: stroke
  prefix: "a"
  tips: "〔笔画〕"
  comment_format:
    - xlit/hspnz/eiuoa

#分段器
emoji:
  tag: emoji
  prefix: "oo"
  tips: "〔emoji〕"
xnumber:
  tag: xnumber
  prefix: "on"
  tips: "〔xnumber〕"

# 打标签
recognizer:
  patterns:
    pinyin_lookup: "^e[a-z]*'?$"
    bihua_lookup: "^a[a-z]*'?$"
    punct: "^/([0-9]0?|[a-z]+)$"
    xnumber: "^on[0-9]*$"
    emoji: "^oo[a-z]*'?$"
    datetime: "^ot$"

# 滤镜
pinyin_reverse_lookup:
  tags: [ pinyin_lookup ]
  overwrite_comment: true
  dictionary: xf
  comment_format:
    - "xform/$/〕/"
    - "xform/^/〔/"
    - "xform/ /, /"


bihua_reverse_lookup:
  tags: [ bihua_lookup ]
  dictionary: xf
  enable_completion: true
  comment_format:
    - "xform/$/〕/"
    - "xform/^/〔/"
    - "xform/ /, /"

key_binder:
  bindings:
    - { when: paging, accept: minus, send: Page_Up }
    - { when: has_menu, accept: equal, send: Page_Down }
    - { when: always, accept: Control+space, toggle: ascii_mode }

menu:
  page_size: 5

punctuator:
  import_preset: symbols
