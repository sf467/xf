  #     - {click: Right1}
  #     - {click: copy}
  #
  #     - {click: cut}
  #     - {click: Left}
  #     - {click: Shift_L2}
  #     - {click: Right}
  #     - {click: paste}
  #
  #     - {click: space1}
  #     - {click: Home}
  #     - {click: Down}
  #     - {click: End}
  #     - {click: BackSpace}
  #
  #     - {click: Keyboard_default}
  #     - {click: undo}
  #     - {click: Tab1}
  #     - {click: redo}
