# Trime custom style settings
# encoding: utf-8

config_version: "3.0"
name: 新西风         #方案名称
author: 魔法帽        #作者信息

#键盘高度
height:
  1: &jpgd1 30 #表情键盘
  2: &jpgd2 24 #颜文字键盘1
  3: &jpgd3 24 #颜文字键盘2
  4: &jpgd4 48 #主键盘
  5: &jpgd5 39.5 #符号键盘
  6: &hgap 4 #键盘横缝大小
  7: &sgap 8 #键盘竖缝大小

#键盘高度
round_corner:
  1: &round1 12 #按键圆角半径
  2: &round2 0 #候选窗口圆角
  3: &round3 12 #回车键圆角
  
#界面风格、功能开关
style:
  auto_caps: false #自動句首大寫:true|false|ascii
  background_dim_amount: 0.5
  candidate_font: han.ttf  #候选字体
  candidate_padding: 4  #候选项内边距
  candidate_spacing: 1  #候选间距
  candidate_text_size: 16  #候选字号
  candidate_use_cursor: true #高亮候选项
  candidate_view_height: 24 #候选区高度
  color_scheme: default #配色方案
  comment_font: comment.ttf #编码提示字体
  comment_height: 16 #编码提示区高度
  comment_on_top: true #编码提示在上方或右侧
  comment_text_size: 14 #编码提示字号
  hanb_font: hanb.ttf #扩充字体
  horizontal: true #水平模式
  horizontal_gap: *hgap #键水平间距
  layout:
    position: fixed #候选窗口位置：left|right|left_up|right_up|fixed|bottom_left|bottom_right|top_left|top_right(left、right需要Android5.0以上)
    min_length: 10 #候选窗口最小词长
    max_length: 14 #超过字数则换行
    sticky_lines: 1 #固顶行数
    max_entries: 5 #候选窗口最大词条数
    border: 0 #候选窗口边框宽度
    max_width: 360 #最大宽度，超过则自动换行
    max_height: 300 #最大高度
    min_width: 0 #最小宽度
    min_height: 50 #最小高度
    margin_x: 5 #水平边距
    margin_y: 5 #竖直边距
    line_spacing: 0 #候选词的行间距(px)
    line_spacing_multiplier: 1.2 #候选词的行间距(倍数)
    spacing: 1 #与预编辑或边缘的距离
    round_corner: *round2 #候选窗口圆角
    alpha: 0xff #透明度(0-255)
    elevation: 0 #阴影(>=Android5.0)
    background: background.png #颜色或者backgrounds目录下的图片文档名
    movable: false #是否可移动窗口，或仅移动一次 true|false|once
    all_phrases: false #显示所有长词
  window: #悬浮窗口组件
#    - {start: "", move: 'ㄓ ', end: ""}
    - {start: "", composition: "%s", end: "", letter_spacing: 0.12} #letter_spacing需要Android5.0
    - {start: "\n", label: "%s.", candidate: "%s", comment: "%s", end: "", sep: "☁️️"}
  key_font: symbol.ttf #键盘字体
  key_height: 32 #键高
  key_long_text_size: 16 #长标签字号
  key_text_size: 24 #键字号
  key_width: 14.28 #键宽，占屏幕宽的百分比
  keyboards: [default, number, numberb]
  keyboard_height: 200 
  keyboard_padding_bottom: 5
  label_text_size: 12 #标签字号ddv
  label_font: label.ttf #编标签字体
  latin_font: latin.ttf #西文本体
  latin_locale: en_US #西文语言
  locale: zh_CN #缺省语言 zh_TW,zh_CN,zh_HK,""
  preview_font: latin.ttf #按键提示字体
  preview_height: 56 #按键提示高度
  preview_offset: -32 #按键提示纵向偏移
  preview_text_size: 40 #按键提示字号
  proximity_correction: true #按键纠错
  reset_ascii_mode: false #显示键盘时重置为中文状态
  round_corner: *round1 #按键圆角半径
  shadow_radius: 0.0 #按键阴影半径
  speech_opencc_config: none #语音输入简繁转换
  symbol_font: symbol.ttf #符号字体
  symbol_text_size: 10 #符号字号
  text_font: latin.ttf #编码字体
  #text_height: 32 #编码区高度
  text_size: 16 #编码区字号
  vertical_correction: -5
  vertical_gap: *sgap #键盘行距

fallback_colors:
  candidate_text_color: text_color
  comment_text_color: candidate_text_color
  border_color: back_color
  candidate_separator_color: border_color
  hilited_text_color: text_color
  hilited_back_color: back_color
  hilited_candidate_text_color: hilited_text_color
  hilited_candidate_back_color: hilited_back_color
  hilited_comment_text_color: comment_text_color
  text_back_color: back_color
  hilited_key_back_color: hilited_candidate_back_color
  hilited_key_text_color: hilited_candidate_text_color
  hilited_key_symbol_color: hilited_comment_text_color
  hilited_off_key_back_color: hilited_key_back_color
  hilited_on_key_back_color: hilited_key_back_color
  hilited_off_key_text_color: hilited_key_text_color
  hilited_on_key_text_color: hilited_key_text_color
  key_back_color: back_color
  key_border_color: border_color
  key_text_color: candidate_text_color
  key_symbol_color: comment_text_color
  keyboard_back_color: border_color
  label_color: candidate_text_color
  off_key_back_color: key_back_color
  off_key_text_color: key_text_color
  on_key_back_color: hilited_key_back_color
  on_key_text_color: hilited_key_text_color
  preview_back_color: key_text_color
  preview_text_color: key_back_color
  shadow_color: border_color

#颜色
colors:
  1: &color1 0xff000000 
  2: &color2 0xffffffff 
  3: &color3 0xffe1e3e7 
  4: &color4 0xffacb2c2 
  5: &color5 0xff131313 
  6: &color6 0xff3266a0 
  7: &color7 0x00 
  8: &color8 0xff838383 
  
#配色方案
preset_color_schemes:
  

  default:
    name: 谷歌／Google
    dark_scheme: steam
    author: skoj <skoj@qq.com>
    text_color: 0xff666666
    candidate_text_color: 0xff000000
    back_color: 0xffFFFFFF
    border_color: 0xffE2E2E2
    hilited_text_color: 0xff000000
    hilited_back_color: 0xffFFFFFF
    hilited_candidate_text_color: 0xffFFFFFF
    hilited_candidate_back_color: 0xff3975CE


  steam:
    name: "Steam"
    light_scheme: default
    author: "Patricivs <ipatrickmac@me.com>"
    text_color: 0xff528ccd
    back_color: 0xff171614
    border_color: 0xff383635
    label_color: 0xffffffff
    hilited_text_color: 0xffd1cfc9
    hilited_back_color: 0xff171614
    candidate_text_color: 0xffffffff
    comment_text_color: 0xffa9a7a7
    hilited_candidate_text_color: 0xffffffff
    hilited_comment_text_color: 0xffa9a7a7
    hilited_candidate_back_color: 0xff314259

#--------配色结束----------------#
    
#键盘布局
preset_keys:
  Keyboard_number: #用于切换到数字键盘的键
    label: 数字 #按键标签
    send: Eisu_toggle #执行切换键盘命令
    select: number #选择number键盘
    functional: false
  Keyboard_default: #用于切换到默认键盘的键
    label: 西风 #按键标签
    send: Eisu_toggle #执行切换键盘命令
    select: default #选择default键盘
    functional: false
  Keyboard_mermaid: #用于切换到默认键盘的键
    label: mermaid #按键标签
    send: Eisu_toggle #执行切换键盘命令
    select: mermaid #选择default键盘
    functional: false
  # Keyboard_numberb: #用于切换到编辑键盘的键
  #   label: 编辑 #按键标签
  #   send: Eisu_toggle #执行切换键盘命令
  #   select: numberb #选择numberb键盘
  #   functional: false

  # 编辑
  Shift_L: {label: 上档, preview: '⇪', send: Shift_L}
  Return: { label: enter_labels, preview: '↩', functional: false, send: Return }
  Return1: {label: Enter, preview: '↩', functional: false, send: Return}
  Return2: {label: 回车, send: Return, functional: false }
  Hide: {label: 隐藏, send: BACK}
  BackSpace: {label: 退格, preview: '⇦', repeatable: true, functional: false, send: BackSpace}
  space: {slide_cursor: true, repeatable: false, preview: ' ', functional: true, label: '_______', send: space}  
  space1: {slide_cursor: true, repeatable: false, label: '空格', functional: false, send: space}
  Clear: {label: 全清, send: Clear}
  Escape: {label: 取消, functional: false, send: Escape}  
  Home: {label: 行首, send: Home, functional: false}
  Insert: {label: 插入, send: Insert}
  Delete: {label: 删除, send: Delete, functional: false}
  End: {label: 行尾, send: End, functional: false}
  Page_Up: {label: 上页, send: Page_Up, functional: false}
  Page_Down: {label: 下页, send: Page_Down, functional: false}
  Left: {label: '←', send: Left, repeatable: true, functional: false}
  Down: {label: '↓', send: Down, repeatable: true, functional: false}
  Up: {label: '↑', send: Up, repeatable: true, functional: false}
  Right: {label: '→', send: Right, repeatable: true, functional: false}
  select_all: {label: 全选, functional: false, send: Control+a}
  cut: {label: 剪切, functional: false, send: Control+x}
  copy: {label: 复制, functional: false, send: Control+c}
  paste: {label: 粘贴, functional: false, send: Control+v}
  paste_clip: {label: 粘贴, send: function, command: clipboard}
  paste_text: {label: 貼上文本, send: Control+Shift+Alt+v} #>=Android 6.0
  share_text: {label: 分享文本, send: Control+Alt+s} #>=Android 6.0
  redo: {label: 重做, functional: false, send: Control+Shift+z} #>=Android 6.0
  undo: {label: 撤銷, functional: false, send: Control+z} #>=Android 6.0
  delimiter: {label: 分词, text: ''''}
  x1: {text: '{Home}{Right}{Right}', label: 单字, functional: false}
  x2: {text: '{Home}{Right}{Right}{Right}{Right}', label: 二字, functional: false}
  x3: {text: '{Home}{Right}{Right}{Right}{Right}{Right}{Right}', label: 三字, functional: false}
  x4: {text: '{Home}{Right}{Right}{Right}{Right}{Right}{Right}{Right}{Right}', label: 四字, functional: false}
 # x1: {text: '{Home}{Right}{Right}', label: 单字, functional: false}
  Left1: {label: '⇦', send: Control+Left, repeatable: true, functional: false}
  Right1: {label: '⇨', send: Control+Right, repeatable: true, functional: false}
  Shift_L2: {label: 选择, preview: '⇪', functional: false, send: Shift_L}


  Mode_switch: {send: Mode_switch, states: ["中文", "西文"], toggle: ascii_mode}
  Theme_settings: {label: 主题, send: SETTINGS, option: "theme"}
  Color_switch: {label: 配色, functional: false, send: PROG_RED}
  IME_switch: {label: 键盘, send: LANGUAGE_SWITCH, select: .next}


  # 液体键盘要用到的
  liquid_keyboard_clipboard: {command: liquid_keyboard, label: "剪贴", option: "剪贴", send: function}
  liquid_keyboard_symbollist: {command: liquid_keyboard, label: "符号表", option: "符号表", send: function}
  liquid_keyboard_exit: {label: 返回, send: function, command: liquid_keyboard, option: "-1"}  #退出liquidkeyboard
  liquid_keyboard_tabs: { label: 更多, send: function, command: liquid_keyboard, option: "更多" }
  menu_keyboard: { label: 菜单, send: function, command: menu_keyboard }

# 预设mermaid键
  kaitou: {}

tool_bar:
  button_spacing: 5 # 按钮间距
  button_font: iconfont.ttf # 按钮字体

  # 左侧固定主按钮配置
  primary_button:
    # 背景样式设置
    background:
      type: circle           # 高亮形状 (可选值: circle|rectangle)
      corner_radius: 10      # 圆角半径
      bg_normal: 0x00        # 正常状态背景颜色
      bg_highlight: hilited_candidate_button_color  # 高亮状态背景色
      vertical_inset: 4      # 垂直方向内缩量
      horizontal_inset: 0    # 水平方向内缩量
    # 前景内容设置
    foreground:
      style: "ic@dots_horizontal"         # 内置质感设计图标样式（以ic@开头）
      fg_normal: candidate_text_color  # 正常状态前景色 (本地图片不允许着色)
      # fg_highlight:        # 高亮状态前景色
      padding: 10            # 前景内容与背景边界的内边距
      # size: [120, 24]      # 视图控件宽高，非前景样式宽高
    # 按钮点击事件
    action: menu_keyboard


  hide_button: &hide_button
    foreground:
      style: "ic@keyboard_close"
      fg_normal: candidate_text_color
    action: Hide

  emoji_button: &emoji_button
    foreground:
      style: "ic@emoticon"
    # 前景样式可以为空，使用默认样式，按钮将显示为 action 的 label
    action: liquid_keyboard_symbollist

  clipboard_button: &clipboard_button
    foreground:
      style: "ic@clipboard"
    action: liquid_keyboard_clipboard

  edit_button: &edit_button
    foreground:
      style: "ic@cursor_text"
    action: Keyboard_numberb
  switch_button: &switch_button
    foreground:
      style: "ic@keyboard_variant"
    action: IME_switch

  ascii_mode_button: &ascii_mode_button
    foreground:
      option_styles: ["中", "En"] # 样式也可以为表，将根据 action 的 toggle 决定
      font_size: 18  # 按钮字体大小
      padding: 10
    action: Mode_switch

  undo_button: &undo_button
    foreground:
      style: "ic@undo"
    action: undo
  redo_button: &redo_button
    foreground:
      style: "ic@redo"
    action: redo

  # 右侧按钮列表（从右向左排列）
  buttons: [ *hide_button, *emoji_button, *clipboard_button,  *redo_button,  *undo_button, *ascii_mode_button,*switch_button ]


preset_keyboards:
  default:
    name: 西风瘦码中文
    author: 魔法帽
  #  ascii_mode: 0 #键盘的默认状态，0为中文，1为英文
    height: 30 #每行高度
    width: 12.5 #按键默认宽度（取所有按键中用得较多的宽度值，接下来就可以少写一些width了）
    horizontal_gap: 1 #键水平间距
    vertical_gap: 1 # 键行距
    keys:
      - { click: a, swipe_up: A, long_click: select_all, swipe_down: IME_switch}
      - { click: q, swipe_up: Q, long_click: "!", swipe_down: 1, hint: 1}
      - { click: w, swipe_up: W, long_click: "@", swipe_down: 2, hint: 2}
      - { click: e, swipe_up: E, long_click: "#", swipe_down: 3, hint: 3}
      - { click: r, swipe_up: R, long_click: "$", swipe_down: 4, hint: 4}
      - { click: t, swipe_up: T, long_click: "%" , swipe_down: 5, hint: 5}
      - { click: o, swipe_up: O, long_click: "-"}
      - { click: p, swipe_up: P, long_click: "_"}
   
      - { click: s, swipe_up: S, long_click: "~"}     
      - { click: y, swipe_up: Y, long_click: "^", swipe_down: 6, hint: 6}
      - { click: u, swipe_up: U, long_click: "&", swipe_down: 7, hint: 7}
      - { click: i, swipe_up: I, long_click: "*", swipe_down: 8, hint: 8}
      - { click: h, swipe_up: H, long_click: "(", swipe_down: 9, hint: 9}
      - { click: j, swipe_up: J, long_click: ")", swipe_down: 0, hint: 0}
      - { click: k, swipe_up: K, long_click: "["}
      - { click: l, swipe_up: L, long_click: "]"}
 
      - { click: z, swipe_up: Z, long_click: "`"}   
      - { click: d, swipe_up: D, long_click: "\\"}
      - { click: f, swipe_up: F, long_click: "|"}
      - { click: g, swipe_up: G, long_click: "liquid_keyboard_symbollist"}
      - { click: n, swipe_up: N, long_click: "{"}
      - { click: m, swipe_up: M, long_click: "}"}  
      - { click: ";", swipe_up: undo, long_click: ":"}
      - { click: "'", swipe_up: redo, long_click: '"'}
    
    
      - { click: Shift_L}
      - { click: x, swipe_up: X, long_click: cut}
      - { click: c, swipe_up: C, long_click: copy}
      - { click: v, swipe_up: V, long_click: paste}
      - { click: b, swipe_up: B, long_click: liquid_keyboard_clipboard}
      - { click: ",", long_click: "<"}
      - { click: ".", long_click: ">"}
      - { click: "/", long_click: "?"}



      - { click: Keyboard_number, long_click: Keyboard_mermaid, functional: false, width: 14.28}
      - { click: space, long_click: Mode_switch, label: '西风瘦码', width: 57.14}  
      - { click: BackSpace, width: 14.28}
      - { click: Return2, width: 14.28}

  # numberb:
  #   ascii_mode: 1
  #   author: flypy.com
  #   name: "编辑键盘"
  #   width: 20
  #   horizontal_gap: 4 #键水平间距
  #   vertical_gap: 2 # 键行距
  #   keys:
  #     - {click: select_all}
  #     - {click: Left1}
