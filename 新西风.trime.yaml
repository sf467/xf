  #



  number: #布局ID
    author: "xq" #作者
    name: "数字+操作键" #方便自己辨识的名字
    ascii_mode: 1 #默认进入英文状态
    height: 44 #每行高度
    width: 11 #按键默认宽度（取所有按键中用得较多的宽度值，接下来就可以少写一些width了）
    horizontal_gap: 4 #键水平间距
    vertical_gap: 3 # 键行距
    keys: #按键排列
      # 第一行
      - { click: "#", long_click: cut }
      - { click: "%", long_click: copy }
      - { click: "@", long_click: paste }
      - { click: "+", width: 13 }
      - { click: 7, width: 18 }
      - { click: 8, width: 18 }
      - { click: 9, width: 18 }
      # 第二行
      - { click: Page_Up}
      - { click: Up}
      - { click: Page_Down}
      - { click: "-", width: 13 }
      - { click: 4, width: 18 }
      - { click: 5, width: 18 }
      - { click: 6, width: 18 }
      # 第三行
      - { click: Left }
      - { click: Shift_L2, long_click: Escape }
      - { click: Right }
      - { click: "×", width: 13 }
      - { click: 1, width: 18 }
      - { click: 2, width: 18 }
      - { click: 3, width: 18 }
      # 第四行
      - { click: Home}
      - { click: Down}
      - { click: End}
      - { click: "÷", width: 13 }
      - { click: ",", width: 18 }
      - { click: 0, width: 18 }
      - { click: BackSpace, width: 18 }
      # 第五行
      - { click: Keyboard_default, long_click: Menu, width: 18 }
      - { click: "±", width: 14.9 } #如果上下的按键没有严格对齐，可以微调宽度
      - { click: "=", width: 13 }
      - { click: space, width: 18, label: 西风瘦码}
      - { click: ., width: 18 }
      - { click: Return, width: 18 }


  mermaid:
    name: mermaid
    author: 魔法帽
    ascii_mode: 0 #键盘的默认状态，0为中文，1为英文
    height: 30 #每行高度
    width: 14.28 #按键默认宽度（取所有按键中用得较多的宽度值，接下来就可以少写一些width了）
    horizontal_gap: 1 #键水平间距
    vertical_gap: 1 # 键行距
    keys:
      - { click: okt, label: 开头, label_symbol: 开头}
      - { click: ojw, label: 结尾, label_symbol: 结尾}
      - { click: olct, label: 图一, label_symbol: 流程图}
      - { click: ozlct, label: 子图,  label_symbol: 流程子图}
      - { click: oztfx, label: 方向, label_symbol: 子图方向}
      - { click: oswzt, label: 图二, label_symbol: 思维导图}
      - { click: okb, label: 图三, label_symbol: 看板图}


      - { click: ofk, label: 框一, label_symbol: 方框}
      - { click: olk,  label: 框二, label_symbol: 菱框}
      - { click: ock,  label: 框三, label_symbol: 操场框}
      - { click: opk,  label: 框四, label_symbol: 四边形框}
      - { click: obgzk,  label: 框五, label_symbol: 不规则框}
      - { click: olbxk,  label: 框六, label_symbol: 六边形框}
      - { click: oyxk,  label: 框七, label_symbol: 圆形框}

